<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settlement Gate — Chew the Cud</title>
<style>
:root{--bg:#f4efe6;--ink:#111b20;--muted:#5d686e;--paper:#fffaf1;--line:#d8cfc0;--accent:#255d72;--rust:#a45d3a;--gold:#d3a64f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 16% 14%,rgba(37,93,114,.16),transparent 32%),radial-gradient(circle at 88% 82%,rgba(211,166,79,.16),transparent 34%),var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}main{width:min(980px,92vw);margin:0 auto;padding:34px 0 72px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.links{display:flex;gap:9px;flex-wrap:wrap}.links a{border:1px solid var(--line);background:rgba(255,250,241,.78);border-radius:999px;padding:10px 13px;text-decoration:none;color:var(--accent);font-weight:900}.mark{display:inline-flex;gap:.5rem;align-items:center;border:1px solid rgba(37,93,114,.24);background:rgba(255,250,241,.78);backdrop-filter:blur(10px);border-radius:999px;padding:9px 14px;color:var(--accent);font-weight:900;letter-spacing:.05em;text-transform:uppercase;font-size:.78rem}.dot{width:9px;height:9px;border-radius:50%;background:var(--gold)}h1{font-size:clamp(2.9rem,8vw,6.8rem);letter-spacing:-.08em;line-height:.88;margin:26px 0 12px}.lede{font-size:clamp(1.15rem,2.4vw,1.72rem);line-height:1.24;color:var(--accent);font-weight:850;letter-spacing:-.034em;max-width:820px}.status{margin-top:24px;background:rgba(255,250,241,.82);border:1px solid var(--line);border-left:7px solid var(--gold);border-radius:22px;padding:18px 20px;color:#334047;font-weight:760}.article{margin-top:24px;background:rgba(255,250,241,.94);border:1px solid var(--line);border-radius:30px;padding:clamp(22px,4vw,44px);box-shadow:0 28px 70px rgba(17,27,32,.09)}.article h1,.article h2,.article h3{letter-spacing:-.04em;line-height:1.02;color:var(--ink)}.article h1{font-size:clamp(2.1rem,5vw,4rem);margin:.1em 0 .35em}.article h2{font-size:clamp(1.65rem,3.5vw,2.55rem);margin:1.3em 0 .45em;border-top:1px solid var(--line);padding-top:.75em}.article h3{font-size:1.3rem;margin:1.1em 0 .3em;color:var(--accent)}.article p{font-size:1.08rem;line-height:1.62;color:#243139}.article li{margin:.45em 0;line-height:1.5}.article code{background:#f1e6d6;border:1px solid #e0d2bd;border-radius:8px;padding:.12em .35em}.article pre{background:#111b20;color:#fff8ec;border-radius:18px;padding:18px;overflow:auto}.article blockquote{border-left:6px solid var(--rust);margin:1em 0;padding:.1em 0 .1em 1em;color:#37454b;background:#fff;border-radius:14px}.source{margin-top:14px;color:var(--muted);font-size:.95rem}.source a{color:var(--accent);font-weight:900}.fallback{display:grid;gap:12px;margin-top:18px}.fallback a{display:block;background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px 14px;color:var(--accent);font-weight:900;text-decoration:none}.track{height:5px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--rust));border-radius:999px;margin:28px 0 0}
</style>
</head>
<body>
<main>
  <div class="topbar"><div class="mark"><span class="dot"></span>Chew the Cud</div><nav class="links"><a href="index.html">Landing</a><a href="anthony.html">Deck</a><a href="examples.html">Worked Examples</a></nav></div>
  <h1>The idea, left open.</h1>
  <p class="lede">A slower reading route for the essay: <em>The Address of the Sentence, A1 to A6</em>. This page is for reflection rather than live delivery.</p>
  <div class="track" aria-hidden="true"></div>
  <div class="status" id="status">Looking for the essay Markdown in this repository…</div>
  <article class="article" id="article" hidden></article>
  <div class="source" id="source"></div>
</main>
<script>
const repo='TitanicParker/settlement-gate';
const titleNeedles=['address of the sentence','a1','a6'];
const preferred=['the-address-of-the-sentence-a1-to-a6.md','The Address of the Sentence A1 to A6.md','The_Address_of_the_Sentence_A1_to_A6.md','address-of-the-sentence-a1-a6.md'];
const statusEl=document.getElementById('status'),articleEl=document.getElementById('article'),sourceEl=document.getElementById('source');
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function inline(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')}
function mdToHtml(md){let lines=md.replace(/\r\n/g,'\n').split('\n'),out=[],inCode=false,code=[],para=[];function flushPara(){if(para.length){out.push('<p>'+inline(para.join(' '))+'</p>');para=[]}}function flushCode(){out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');code=[]}for(const line of lines){if(line.trim().startsWith('```')){if(inCode){flushCode();inCode=false}else{flushPara();inCode=true}continue}if(inCode){code.push(line);continue}if(!line.trim()){flushPara();continue}let m=line.match(/^(#{1,3})\s+(.+)$/);if(m){flushPara();out.push(`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`);continue}if(line.trim().startsWith('>')){flushPara();out.push('<blockquote><p>'+inline(line.replace(/^>\s?/,''))+'</p></blockquote>');continue}if(/^[-*]\s+/.test(line.trim())){flushPara();out.push('<p>• '+inline(line.trim().replace(/^[-*]\s+/,''))+'</p>');continue}para.push(line.trim())}flushPara();return out.join('\n')}
async function fetchText(path){const res=await fetch(path,{cache:'no-store'});if(!res.ok)throw new Error(path+' '+res.status);return await res.text()}
async function findEssay(){for(const p of preferred){try{const txt=await fetchText(p);if(txt.toLowerCase().includes('address of the sentence')||txt.toLowerCase().includes('a1'))return {path:p,text:txt}}catch(e){}}
  const api=`https://api.github.com/repos/${repo}/contents`;
  const res=await fetch(api,{cache:'no-store'});if(!res.ok)throw new Error('Could not read repository contents.');
  const files=await res.json();
  const markdown=files.filter(f=>f.type==='file'&&/\.md$/i.test(f.name)&&!/^readme\.md$/i.test(f.name));
  const named=markdown.find(f=>{const n=f.name.toLowerCase();return titleNeedles.every(x=>n.includes(x.replace(/\s+/g,'-'))) || (n.includes('address')&&n.includes('sentence'))});
  const candidates=named?[named,...markdown.filter(f=>f!==named)]:markdown;
  for(const f of candidates){try{const txt=await fetchText(f.name);const low=txt.toLowerCase();if(low.includes('the address of the sentence')||(low.includes('address of the sentence')&&low.includes('a1')&&low.includes('a6')))return {path:f.name,text:txt}}catch(e){}}
  return {path:null,text:null,files:markdown};
}
findEssay().then(found=>{if(found.text){articleEl.innerHTML=mdToHtml(found.text);articleEl.hidden=false;statusEl.textContent='Essay loaded from '+found.path+'.';sourceEl.innerHTML='Source Markdown: <a href="'+encodeURI(found.path)+'">'+esc(found.path)+'</a>'}else{statusEl.textContent='I could not automatically identify the essay yet. The Markdown may still be uploading, or the title may not appear inside the file.';articleEl.hidden=true;if(found.files&&found.files.length){sourceEl.innerHTML='<div class="fallback"><strong>Markdown files available:</strong>'+found.files.map(f=>'<a href="'+encodeURI(f.name)+'">'+esc(f.name)+'</a>').join('')+'</div>'}}}).catch(err=>{statusEl.textContent='Could not load the essay automatically. The raw Markdown link may still work once the upload is complete.';sourceEl.innerHTML='<div class="fallback"><a href="the-address-of-the-sentence-a1-to-a6.md">Try the likely essay filename</a></div>'});
</script>
</body>
</html>
