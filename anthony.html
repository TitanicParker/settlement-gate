<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settlement Gate — Anthony Deck</title>
<style>
:root{--bg:#111b20;--ink:#fff8ec;--paper:#f7efe2;--text:#10191e;--muted:#66737a;--line:#d5cbbc;--blue:#255d72;--rust:#a45d3a;--gold:#d3a64f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 20%,rgba(211,166,79,.16),transparent 28%),radial-gradient(circle at 88% 70%,rgba(37,93,114,.26),transparent 34%),var(--bg);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);overflow:hidden}.deck{height:100vh;display:grid;place-items:center;padding:28px}.slide{display:none;width:min(1180px,95vw);height:min(720px,88vh);background:var(--paper);color:var(--text);border:1px solid rgba(255,248,236,.18);border-radius:34px;box-shadow:0 38px 110px rgba(0,0,0,.36);padding:42px 48px;position:relative;overflow:hidden}.slide.active{display:grid;grid-template-columns:1.04fr .96fr;gap:36px}.slide:before{content:"";position:absolute;inset:auto 0 0 0;height:10px;background:linear-gradient(90deg,var(--blue),var(--gold),var(--rust))}.top{display:flex;justify-content:space-between;align-items:center;gap:18px;color:var(--blue);font-size:.78rem;letter-spacing:.09em;text-transform:uppercase;font-weight:950}.count{color:var(--muted)}.copy{position:relative;z-index:1;display:flex;flex-direction:column}.minute{margin-top:38px;display:inline-flex;align-self:flex-start;border:1px solid rgba(37,93,114,.25);border-radius:999px;padding:8px 11px;color:var(--blue);font-weight:950;font-size:.84rem;letter-spacing:.03em;text-transform:uppercase}.line{font-size:clamp(2rem,4.45vw,4.85rem);line-height:.94;letter-spacing:-.072em;font-weight:950;margin:18px 0 0;max-width:760px}.cue{margin-top:26px;font-size:clamp(1.08rem,1.85vw,1.48rem);line-height:1.25;color:#344147;font-weight:760;max-width:660px}.cue strong{color:var(--rust)}.listen{margin-top:auto;border-left:6px solid var(--rust);padding:14px 0 14px 18px;color:#3a454a;font-size:1.02rem;line-height:1.36;max-width:650px}.visual{position:relative;z-index:1;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.56),rgba(255,255,255,.22));display:grid;place-items:center;overflow:hidden;min-height:480px}.smalllabel{position:absolute;bottom:24px;left:24px;right:24px;text-align:center;color:var(--muted);font-weight:850}.rails{width:78%;height:48%;position:relative}.rails:before,.rails:after{content:"";position:absolute;left:0;right:0;height:8px;background:var(--blue);border-radius:999px}.rails:before{top:34%}.rails:after{bottom:34%}.tie{position:absolute;top:24%;bottom:24%;width:5px;background:rgba(37,93,114,.34);transform:rotate(18deg)}.train{position:absolute;left:8%;top:50%;width:86px;height:44px;border-radius:14px 20px 20px 14px;background:var(--rust);transform:translateY(-50%);box-shadow:140px 0 0 var(--gold),280px 0 0 var(--blue)}.station{position:absolute;right:7%;top:29%;bottom:29%;width:14%;border:5px solid var(--rust);border-radius:12px;background:rgba(164,93,58,.08)}.gap{position:absolute;right:21%;top:30%;bottom:30%;width:16%;background:var(--paper);border-left:2px dashed var(--rust);border-right:2px dashed var(--rust)}.dog{font-size:clamp(1.9rem,4vw,4.1rem);font-weight:950;letter-spacing:-.05em;color:var(--blue);padding:28px;text-align:center}.blank{display:inline-block;min-width:150px;border-bottom:8px solid var(--rust);transform:translateY(-8px)}.overshoot{position:absolute;right:30px;top:50%;font-size:clamp(2rem,5vw,5rem);font-weight:950;color:var(--rust);transform:translateY(-50%) rotate(5deg)}.machine{width:76%;height:58%;border-radius:26px;border:8px solid var(--blue);position:relative}.machine:before{content:"MEANING";position:absolute;inset:0;display:grid;place-items:center;font-size:clamp(2rem,5vw,4.7rem);font-weight:950;color:var(--blue)}.wire{position:absolute;background:var(--rust);height:8px;border-radius:999px}.wire.one{left:10%;right:10%;bottom:18%}.wire.two{left:18%;right:28%;top:20%;transform:rotate(-12deg)}.inherit{display:flex;gap:18px;align-items:center;font-weight:950;color:var(--blue);font-size:clamp(1.15rem,2.2vw,2.05rem)}.node{border:4px solid var(--blue);border-radius:22px;padding:18px;background:#fff}.arrow{color:var(--rust);font-size:2.3rem}.tokens{display:grid;grid-template-columns:repeat(6,32px);gap:10px}.token{width:32px;height:32px;border-radius:9px;background:rgba(37,93,114,.25)}.sentencebar{position:absolute;bottom:28%;left:15%;right:15%;height:68px;border-radius:999px;background:var(--blue);display:grid;place-items:center;color:#fff;font-weight:950;font-size:1.4rem}.pin{width:42px;height:42px;border-radius:50% 50% 50% 0;background:var(--rust);transform:rotate(-45deg)}.pin:after{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--paper)}.doorgrid{display:grid;gap:24px;width:84%;font-weight:950;font-size:clamp(1.35rem,2.9vw,2.8rem);color:var(--blue)}.doorrow{display:flex;justify-content:space-between;gap:20px;border-bottom:4px solid var(--line);padding-bottom:12px}.tag{color:var(--rust)}.apacket{display:grid;grid-template-columns:repeat(3,82px);gap:14px}.cell{height:82px;border-radius:22px;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:950;font-size:1.4rem}.pipeline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;width:85%;font-weight:950}.pipe{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px 15px;color:var(--blue)}.receipt{width:72%;background:#fff;border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 18px 40px rgba(0,0,0,.08)}.receipt div{height:12px;background:var(--line);border-radius:99px;margin:14px 0}.receipt div:nth-child(1){background:var(--blue);width:80%}.receipt div:nth-child(3){background:var(--rust);width:62%}.translation{display:grid;gap:18px;width:78%;font-weight:950;color:var(--blue);font-size:1.7rem}.lang{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}.same{justify-self:center;background:var(--rust);color:#fff;border-radius:999px;padding:10px 16px;font-size:1rem}.labelcard{font-size:clamp(2rem,5vw,4.6rem);font-weight:950;color:var(--blue);letter-spacing:-.06em;text-align:center}.audit{display:inline-block;border:5px solid var(--rust);border-radius:18px;padding:8px 12px;color:var(--rust);transform:rotate(-5deg)}.nav{position:fixed;left:0;right:0;bottom:16px;display:flex;justify-content:center;gap:10px;z-index:5}.nav button,.nav a{border:1px solid rgba(255,248,236,.2);background:rgba(255,248,236,.12);backdrop-filter:blur(10px);color:var(--ink);border-radius:999px;padding:10px 14px;text-decoration:none;font-weight:900;cursor:pointer}.hint{position:fixed;right:22px;top:18px;color:rgba(255,248,236,.7);font-size:.92rem}.progress{position:fixed;left:0;top:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--rust));z-index:6;width:0}@media(max-width:850px){body{overflow:auto}.deck{min-height:100vh;height:auto}.slide{height:auto;min-height:86vh}.slide.active{grid-template-columns:1fr}.visual{min-height:260px}.hint{display:none}.nav{position:sticky;background:var(--bg);padding:10px;bottom:0}.line{font-size:clamp(2.15rem,10vw,4.2rem)}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="hint">Use ← → keys</div>
<main class="deck" id="deck"></main>
<nav class="nav"><a href="index.html">Landing</a><button onclick="prev()">Back</button><button onclick="next()">Next</button></nav>
<script>
const slides=[
{m:'Minutes 2–3',line:'A sentence is not complete because it stops. It stops because it has become complete.',cue:'Liam is introducing the train-and-track metaphor, then reversing the ordinary assumption: stopping is not completion; completion is the landing that makes stopping possible.',listen:'Listen for: meaning arrives, the train reaches the station, but the rails disappear.',viz:'rails'},
{m:'Minute 4',line:'You know a sentence is broken before you know why it is broken.',cue:'Liam moves from metaphor to bodily recognition. The listener feels the break before naming grammar, syntax, or transitivity.',listen:'Listen for: the little jolt, recoil, and waiting.',viz:'gap'},
{m:'Minute 5',line:'“Did you put the dog?” exposes the structure by failing to close.',cue:'This is the first diagnostic example. The sentence opens a demand and does not satisfy it. The listener waits for the missing landing.',listen:'Listen for: “put the dog where?” and the idea of before-closure failure.',viz:'dog1'},
{m:'Minute 6',line:'“Did you put the dog out, milk?” exposes the structure by going past closure.',cue:'This is the opposite failure. “Did you put the dog out?” has already landed; “milk” arrives after closure and damages the completed act.',listen:'Listen for: completion has edges — too little fails, too much violates.',viz:'dog2'},
{m:'Minutes 7–8',line:'Meaning is so successful that it hides the machinery that produced it.',cue:'Liam draws the lesson from the dog examples. Working sentences hide their structure because meaning arrives too quickly and too successfully.',listen:'Listen for: comprehension is not inspection.',viz:'machine'},
{m:'Minute 11',line:'The sentence is the smallest unit of language that can be inherited.',cue:'The argument turns practical. Legal clauses, policy rules, medical instructions, translations, and AI-agent commands travel as completed sentences.',listen:'Listen for: once a sentence lands, another person or system may act from it.',viz:'inherit'},
{m:'Minute 12',line:'AI does not meet us in tokens. It meets us in completed sentences.',cue:'Liam distinguishes the model’s internal generation from the human/action layer. We do not sign, obey, approve, or govern from isolated tokens.',listen:'Listen for: the completed sentence is the first auditable unit of AI output.',viz:'tokens'},
{m:'Minute 13',line:'Every completed sentence lands somewhere. That landing is its address.',cue:'The central proposition arrives. Address does not mean topic, grammar, or paraphrase; it means the structural landing created when the sentence completes.',listen:'Listen for: a sentence does something, sends attention somewhere, and leaves something behind.',viz:'pin'},
{m:'Minutes 14–15',line:'Two similar sentences can have different addresses: “The door closed” and “The door is closed.”',cue:'The door pair makes address visible. Same door, similar surface, different landing: one event occurred; one state holds.',listen:'Listen for: why surface meaning is not enough for AI, legal, repair, security, or translation systems.',viz:'door'},
{m:'Minutes 16–17',line:'The A-packet slows the sentence down long enough for structure to become visible.',cue:'The instrument enters. A1 to A6 interrupts the collapse into meaning and creates the held-open moment before the sentence can govern action.',listen:'Listen for: Sentence → A-packet → Resolver → Address → Receipt.',viz:'apacket'},
{m:'Minute 18',line:'A1 to A6 is not the theory. It is the instrument that lets us see the theory.',cue:'Liam explains the six questions in plain English: survivor, governed object, work, scope, remaining shape, and defeated rival.',listen:'Listen for: A6 as the immune system of the method.',viz:'instrument'},
{m:'Minutes 19–20',line:'A receipt is what remains when a sentence has shown its commitments.',cue:'A local Galway example becomes an auditable settlement, then the receipt records what the sentence settled, where it holds, and what rival reading was blocked.',listen:'Listen for: proceed, revise, escalate, block, or request evidence.',viz:'receipt'},
{m:'Minute 24',line:'A successful translation should preserve the address, even when every word changes.',cue:'Translation becomes a test. If address is structural, faithful translation should preserve the landing even when language, grammar, and wording change.',listen:'Listen for: if the address changes, either the translation shifted or the resolution failed.',viz:'translation'},
{m:'Minute 25',line:'In the Galway packet, English and Irish sentence pairs resolve to the same structural landings.',cue:'Liam gives the local bilingual pressure test: ordinary Galway/PorterShed sentence pairs resolve to matching structural landings.',listen:'Listen for: not proof of universality, but exactly the kind of testable result worth protecting.',viz:'galway'},
{m:'Minutes 27–30',line:'The future I am imagining is simple: every important sentence carries a small audit label.',cue:'The presentation closes by returning to the ask: protect first, validate second, product third — so sentence-level audit infrastructure can be tested safely.',listen:'Listen for: a sentence says, does, and lands; the A-packet exposes the track.',viz:'audit'}
];
let i=0;const deck=document.getElementById('deck'),progress=document.getElementById('progress');
function visual(type){if(type==='rails')return '<div class="rails"><i class="tie" style="left:10%"></i><i class="tie" style="left:25%"></i><i class="tie" style="left:40%"></i><i class="tie" style="left:55%"></i><i class="tie" style="left:70%"></i><div class="train"></div><div class="station"></div></div><div class="smalllabel">Meaning arrives. The track disappears.</div>';if(type==='gap')return '<div class="rails"><i class="tie" style="left:10%"></i><i class="tie" style="left:28%"></i><i class="tie" style="left:58%"></i><i class="tie" style="left:76%"></i><div class="gap"></div></div><div class="smalllabel">You feel the gap before you explain it.</div>';if(type==='dog1')return '<div class="dog">Did you put<br>the dog <span class="blank"></span> ?</div>';if(type==='dog2')return '<div class="dog">Did you put<br>the dog out?</div><div class="overshoot">milk</div>';if(type==='machine')return '<div class="machine"><i class="wire one"></i><i class="wire two"></i></div><div class="smalllabel">The working sentence hides its own machinery.</div>';if(type==='inherit')return '<div class="inherit"><span class="node">sentence</span><span class="arrow">→</span><span class="node">inherited</span><span class="arrow">→</span><span class="node">action</span></div>';if(type==='tokens')return '<div class="tokens">'+Array.from({length:36},()=>'<span class="token"></span>').join('')+'</div><div class="sentencebar">completed sentence</div>';if(type==='pin')return '<div class="pin"></div><div class="smalllabel">The landing is the address.</div>';if(type==='door')return '<div class="doorgrid"><div class="doorrow"><span>The door closed</span><span class="tag">event</span></div><div class="doorrow"><span>The door is closed</span><span class="tag">state</span></div></div>';if(type==='apacket')return '<div class="pipeline"><span class="pipe">Sentence</span>→<span class="pipe">A-packet</span>→<span class="pipe">Resolver</span>→<span class="pipe">Address</span>→<span class="pipe">Receipt</span></div><div class="smalllabel">The held-open moment.</div>';if(type==='instrument')return '<div class="apacket"><div class="cell">A1</div><div class="cell">A2</div><div class="cell">A3</div><div class="cell">A4</div><div class="cell">A5</div><div class="cell">A6</div></div><div class="smalllabel">A6 blocks the tempting rival reading.</div>';if(type==='receipt')return '<div class="receipt"><strong>Sentence receipt</strong><div></div><div></div><div></div><div></div><div></div></div>';if(type==='translation'||type==='galway')return '<div class="translation"><div class="lang">English sentence</div><div class="same">same structural landing</div><div class="lang">Irish sentence</div></div>';return '<div class="labelcard">sentence <span class="audit">AUDIT</span><br>label</div>'}
function render(){deck.innerHTML=slides.map((s,n)=>`<section class="slide ${n===i?'active':''}"><div class="copy"><div class="top"><span>Settlement Gate</span><span class="count">${String(n+1).padStart(2,'0')} / 15</span></div><div class="minute">${s.m}</div><h1 class="line">${s.line}</h1><p class="cue">${s.cue}</p><div class="listen"><strong>Delivery cue:</strong> ${s.listen}</div></div><div class="visual">${visual(s.viz)}</div></section>`).join('');progress.style.width=((i+1)/slides.length*100)+'%'}
function next(){i=Math.min(slides.length-1,i+1);render()}function prev(){i=Math.max(0,i-1);render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();});render();
</script>
</body>
</html>
