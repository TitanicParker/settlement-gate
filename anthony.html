<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settlement Gate — Anthony Deck</title>
<style>
:root{--bg:#f7f4ed;--ink:#172126;--muted:#5c686d;--card:#fff;--accent:#315f72;--line:#d9d4ca}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.deck{min-height:100vh;display:grid;place-items:center;padding:24px}.slide{display:none;width:min(1100px,96vw);min-height:min(680px,86vh);background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:0 18px 48px rgba(23,33,38,.13);padding:54px}.slide.active{display:flex;flex-direction:column}.eyebrow{color:var(--accent);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.85rem}.num{margin-left:auto;color:var(--muted);font-weight:700}.top{display:flex;gap:16px}.title{font-size:clamp(1.9rem,3.5vw,3.8rem);line-height:1;margin:28px 0 18px;letter-spacing:-.045em}.line{font-size:clamp(1.45rem,2.7vw,2.6rem);line-height:1.08;color:var(--accent);font-weight:800;max-width:900px}.bullets{margin-top:34px;font-size:clamp(1.05rem,1.7vw,1.35rem);max-width:780px}.bullets li{margin:10px 0}.visual{margin-top:auto;color:var(--muted);border-top:1px solid var(--line);padding-top:18px;font-size:1rem}.nav{position:fixed;left:0;right:0;bottom:14px;display:flex;justify-content:center;gap:10px}button,a.home{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:10px 14px;font-weight:800;text-decoration:none;cursor:pointer}.hint{position:fixed;right:18px;top:14px;color:var(--muted);font-size:.9rem}@media(max-width:700px){.slide{padding:34px;min-height:82vh}.bullets{font-size:1.05rem}}</style>
</head>
<body>
<div class="hint">Use ← → keys</div>
<main class="deck" id="deck"></main>
<nav class="nav"><a class="home" href="index.html">Home</a><button onclick="prev()">Back</button><button onclick="next()">Next</button></nav>
<script>
const slides=[
{t:'The Ask to Anthony',l:'Help me protect, test, and commercialise this before it is exposed too widely.',b:['Completed sentences may have recoverable structural addresses.','Faithful translations should preserve the same address.','Possible use: sentence-auditing for AI, translation, legal text, policy, and agent instructions.','Need: safe route through IP, validation, and commercial development.','Not asking for belief today — asking for the right next step.'],v:'Protect → Validate → Build'},
{t:'Completion Comes Before Stopping',l:'A sentence is not complete because it stops. It stops because it has become complete.',b:['Completion is something we feel before we explain.','A sentence lands before we analyse it.','The project begins with that ordinary recognition.','This is not yet proof — it is the phenomenon.'],v:'Sentence line moving toward a landing marker.'},
{t:'Broken Before Explained',l:'You know a sentence is broken before you know why it is broken.',b:['Human listeners detect failure instantly.','The judgement arrives before grammar.','This suggests completion is structural, not just semantic.','The listener often knows before the analyst does.'],v:'A half-built bridge with the last section missing.'},
{t:'Failure to Close',l:'“Did you put the dog?” exposes the structure by failing to close.',b:['The sentence creates a demand it does not satisfy.','The listener waits for completion.','The missing piece is felt as structural pressure.','The system begins by noticing that pressure.'],v:'Large text: “Did you put the dog ___ ?”'},
{t:'Going Past Closure',l:'“Did you put the dog out, milk?” exposes the structure by going past closure.',b:['“Did you put the dog out?” has already landed.','Adding “milk” violates the completed structure.','This is the opposite of incompletion.','Completion has a boundary.'],v:'A landing point, then one word going past it.'},
{t:'Meaning Hides the Machinery',l:'Meaning is so successful that it hides the machinery that produced it.',b:['We usually notice meaning, not settlement.','Fluent language can conceal structural commitments.','AI fluency makes this more urgent.','The question becomes: what did the sentence actually settle?'],v:'A lit room with hidden wiring behind the wall.'},
{t:'The Smallest Inheritable Whole',l:'The sentence is the smallest unit of language that can be inherited.',b:['A completed sentence can travel between minds.','Laws, instructions, promises, and claims move as sentences.','Once inherited, a sentence can govern action.','That makes completion auditable.'],v:'Speaker → sentence → listener → system → action.'},
{t:'AI Meets Us in Sentences',l:'AI does not meet us in tokens. It meets us in completed sentences.',b:['Models may generate tokens internally.','Humans inherit completed claims, instructions, and explanations.','A token is not what signs a contract or grants permission.','AI safety needs sentence-level auditability.'],v:'Tokens inside the machine; completed sentence outside.'},
{t:'Every Sentence Lands Somewhere',l:'Every completed sentence lands somewhere. That landing is its address.',b:['Address does not mean topic.','Address means structural landing.','The packet resolves landings as Remainder / Orientation / Operator.','The practical question: can the landing be recovered?'],v:'Sentence → A-packet → Address label.'},
{t:'Similar Words, Different Landings',l:'Two similar sentences can have different addresses: “The door closed” and “The door is closed.”',b:['One leaves an event.','One leaves a state.','Similar surface, different settlement.','AI, legal, and operational systems should not collapse them.'],v:'“The door closed” = event / “The door is closed” = state.'},
{t:'Slowing the Sentence Down',l:'The A-packet slows the sentence down long enough for structure to become visible.',b:['Ordinary reading collapses quickly into meaning.','A1–A6 interrupts that collapse.','It asks what survived, what is governed, and what rival reading must not win.','This creates inspectable evidence.'],v:'Six checkpoints: A1 A2 A3 A4 A5 A6.'},
{t:'Instrument, Not Theory',l:'A1 to A6 is not the theory. It is the instrument that lets us see the theory.',b:['A1–A6 is a method of inspection.','It does not require showing all 54 cells.','It helps humans and machines avoid surface capture.','The instrument makes the claim testable.'],v:'A microscope labelled A1–A6 looking at a sentence.'},
{t:'Sentence Receipts',l:'A receipt is what remains when a sentence has shown its commitments.',b:['A receipt is not a summary.','It records what the sentence settled.','It records what rival reading was blocked.','It can support proceed / revise / escalate / block decisions.'],v:'Claim / Scope / Condition / Rival blocked.'},
{t:'Translation as Pressure Test',l:'A successful translation should preserve the address, even when every word changes.',b:['Words may change completely across languages.','Structure should remain if the translation is faithful.','Address matching gives a new translation check.','This is a testable claim, not a finished proof.'],v:'English sentence → Irish sentence → same address label.'},
{t:'Galway / Irish Demo',l:'In the Galway packet, English and Irish sentence pairs resolve to the same structural landings.',b:['Transport plan: same landing.','PorterShed hosting: same landing.','Startup accelerator: same landing.','Flooding cause/result: same landing.','AI study publication: same landing.'],v:'A simple bilingual table with matching address labels.'},
{t:'The Future Audit Label',l:'The future I am imagining is simple: every important sentence carries a small audit label.',b:['Legal clauses.','Policy language.','AI instructions.','Translation outputs.','Agent permissions.'],v:'A sentence with a small audit tag.'},
{t:'The Ask to Anthony and PorterShed',l:'Help me take the next step safely.',b:['Do next: advise on protection, trusted review, and commercial path.','Do not do yet: circulate widely or overexpose the mechanism.','Useful introductions: IP, AI validation, translation experts, product builders, commercialisation mentors.','Safe next step: small confidential review with the right people.','Goal: test the discovery without losing its value.'],v:'Protect → Validate → Build, with Next Step highlighted.'}
];
let i=0;const deck=document.getElementById('deck');function render(){deck.innerHTML=slides.map((s,n)=>`<section class="slide ${n===i?'active':''}"><div class="top"><div class="eyebrow">Settlement Gate</div><div class="num">${n}/16</div></div><h1 class="title">${s.t}</h1><div class="line">${s.l}</div><ul class="bullets">${s.b.map(x=>`<li>${x}</li>`).join('')}</ul><div class="visual">${s.v}</div></section>`).join('')}function next(){i=Math.min(slides.length-1,i+1);render()}function prev(){i=Math.max(0,i-1);render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev()});render();
</script>
</body>
</html>
