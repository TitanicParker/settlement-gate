<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settlement Gate — Anthony Deck</title>
<style>
:root{--bg:#111b20;--ink:#fff8ec;--paper:#f7efe2;--text:#10191e;--muted:#66737a;--line:#d5cbbc;--blue:#255d72;--rust:#a45d3a;--gold:#d3a64f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 20%,rgba(211,166,79,.16),transparent 28%),radial-gradient(circle at 88% 70%,rgba(37,93,114,.26),transparent 34%),var(--bg);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);overflow:hidden}.deck{height:100vh;display:grid;place-items:center;padding:28px}.slide{display:none;width:min(1180px,95vw);height:min(720px,88vh);background:var(--paper);color:var(--text);border:1px solid rgba(255,248,236,.18);border-radius:34px;box-shadow:0 38px 110px rgba(0,0,0,.36);padding:42px 48px;position:relative;overflow:hidden}.slide.active{display:grid;grid-template-columns:1.05fr .95fr;gap:36px}.slide:before{content:"";position:absolute;inset:auto 0 0 0;height:10px;background:linear-gradient(90deg,var(--blue),var(--gold),var(--rust))}.top{display:flex;justify-content:space-between;align-items:center;gap:18px;color:var(--blue);font-size:.78rem;letter-spacing:.09em;text-transform:uppercase;font-weight:950}.count{color:var(--muted)}.copy{position:relative;z-index:1;display:flex;flex-direction:column}.kicker{margin-top:46px;color:var(--muted);font-weight:850;letter-spacing:.04em;text-transform:uppercase}.line{font-size:clamp(2.1rem,4.8vw,5.15rem);line-height:.93;letter-spacing:-.075em;font-weight:950;margin:14px 0 0;max-width:760px}.example{margin-top:28px;font-size:clamp(1.2rem,2.1vw,1.7rem);line-height:1.18;color:var(--blue);font-weight:850;max-width:650px}.ask{margin-top:auto;border-left:6px solid var(--rust);padding:14px 0 14px 18px;color:#3a454a;font-size:1.04rem;line-height:1.38;max-width:650px}.visual{position:relative;z-index:1;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.54),rgba(255,255,255,.22));display:grid;place-items:center;overflow:hidden;min-height:480px}.rails{width:78%;height:48%;position:relative}.rails:before,.rails:after{content:"";position:absolute;left:0;right:0;height:8px;background:var(--blue);border-radius:999px}.rails:before{top:34%}.rails:after{bottom:34%}.tie{position:absolute;top:24%;bottom:24%;width:5px;background:rgba(37,93,114,.34);transform:rotate(18deg)}.train{position:absolute;left:8%;top:50%;width:86px;height:44px;border-radius:14px 20px 20px 14px;background:var(--rust);transform:translateY(-50%);box-shadow:140px 0 0 var(--gold),280px 0 0 var(--blue)}.gap{position:absolute;right:21%;top:30%;bottom:30%;width:16%;background:var(--paper);border-left:2px dashed var(--rust);border-right:2px dashed var(--rust)}.bigword{font-size:clamp(3rem,8vw,6.8rem);font-weight:950;letter-spacing:-.08em;color:var(--blue);text-align:center;line-height:.88}.smalllabel{position:absolute;bottom:24px;left:24px;right:24px;text-align:center;color:var(--muted);font-weight:850}.dog{font-size:clamp(1.9rem,4vw,4.1rem);font-weight:950;letter-spacing:-.05em;color:var(--blue);padding:28px;text-align:center}.blank{display:inline-block;min-width:150px;border-bottom:8px solid var(--rust);transform:translateY(-8px)}.overshoot{position:absolute;right:30px;top:50%;font-size:clamp(2rem,5vw,5rem);font-weight:950;color:var(--rust);transform:translateY(-50%) rotate(5deg)}.machine{width:72%;height:58%;border-radius:26px;border:8px solid var(--blue);position:relative}.machine:before{content:"MEANING";position:absolute;inset:0;display:grid;place-items:center;font-size:clamp(2rem,5vw,4.7rem);font-weight:950;color:var(--blue)}.wire{position:absolute;background:var(--rust);height:8px;border-radius:999px}.wire.one{left:10%;right:10%;bottom:18%}.wire.two{left:18%;right:28%;top:20%;transform:rotate(-12deg)}.inherit{display:flex;gap:18px;align-items:center;font-weight:950;color:var(--blue);font-size:clamp(1.2rem,2.4vw,2.2rem)}.node{border:4px solid var(--blue);border-radius:22px;padding:18px;background:#fff}.arrow{color:var(--rust);font-size:2.3rem}.tokens{display:grid;grid-template-columns:repeat(6,32px);gap:10px}.token{width:32px;height:32px;border-radius:9px;background:rgba(37,93,114,.25)}.sentencebar{position:absolute;bottom:28%;left:15%;right:15%;height:68px;border-radius:999px;background:var(--blue);display:grid;place-items:center;color:#fff;font-weight:950;font-size:1.4rem}.pin{width:42px;height:42px;border-radius:50% 50% 50% 0;background:var(--rust);transform:rotate(-45deg)}.pin:after{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--paper)}.doorgrid{display:grid;gap:24px;width:82%;font-weight:950;font-size:clamp(1.4rem,3vw,3.1rem);color:var(--blue)}.doorrow{display:flex;justify-content:space-between;gap:20px;border-bottom:4px solid var(--line);padding-bottom:12px}.tag{color:var(--rust)}.apacket{display:grid;grid-template-columns:repeat(3,82px);gap:14px}.cell{height:82px;border-radius:22px;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:950;font-size:1.4rem}.receipt{width:68%;background:#fff;border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 18px 40px rgba(0,0,0,.08)}.receipt div{height:12px;background:var(--line);border-radius:99px;margin:14px 0}.receipt div:nth-child(1){background:var(--blue);width:80%}.receipt div:nth-child(3){background:var(--rust);width:62%}.translation{display:grid;gap:18px;width:78%;font-weight:950;color:var(--blue);font-size:1.8rem}.lang{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}.same{justify-self:center;background:var(--rust);color:#fff;border-radius:999px;padding:10px 16px;font-size:1rem}.labelcard{font-size:clamp(2rem,5vw,4.6rem);font-weight:950;color:var(--blue);letter-spacing:-.06em;text-align:center}.audit{display:inline-block;border:5px solid var(--rust);border-radius:18px;padding:8px 12px;color:var(--rust);transform:rotate(-5deg)}.nav{position:fixed;left:0;right:0;bottom:16px;display:flex;justify-content:center;gap:10px;z-index:5}.nav button,.nav a{border:1px solid rgba(255,248,236,.2);background:rgba(255,248,236,.12);backdrop-filter:blur(10px);color:var(--ink);border-radius:999px;padding:10px 14px;text-decoration:none;font-weight:900;cursor:pointer}.hint{position:fixed;right:22px;top:18px;color:rgba(255,248,236,.7);font-size:.92rem}.progress{position:fixed;left:0;top:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--rust));z-index:6;width:0}@media(max-width:850px){body{overflow:auto}.deck{min-height:100vh;height:auto}.slide{height:auto;min-height:86vh}.slide.active{grid-template-columns:1fr}.visual{min-height:260px}.hint{display:none}.nav{position:sticky;background:var(--bg);padding:10px;bottom:0}.line{font-size:clamp(2.3rem,12vw,4.5rem)}}
</style>
</head>
<body>
<div class="progress" id="progress"></div><div class="hint">Use ← → keys</div><main class="deck" id="deck"></main><nav class="nav"><a href="index.html">Landing</a><button onclick="prev()">Back</button><button onclick="next()">Next</button></nav>
<script>
const slides=[
{line:'A sentence is not complete because it stops. It stops because it has become complete.',example:'Completion is the landing, not the silence after it.',viz:'rails',k:'Completion'},
{line:'You know a sentence is broken before you know why it is broken.',example:'The jolt arrives before the grammar lesson.',viz:'gap',k:'Pre-theory recognition'},
{line:'“Did you put the dog?” exposes the structure by failing to close.',example:'Put the dog where? The sentence has opened a demand.',viz:'dog1',k:'Before-closure failure'},
{line:'“Did you put the dog out, milk?” exposes the structure by going past closure.',example:'The sentence landed. Then one extra word violated the landing.',viz:'dog2',k:'After-closure failure'},
{line:'Meaning is so successful that it hides the machinery that produced it.',example:'The better the sentence works, the less visible its track becomes.',viz:'machine',k:'Hidden machinery'},
{line:'The sentence is the smallest unit of language that can be inherited.',example:'Laws, policies, instructions, claims, and AI outputs travel as completed sentences.',viz:'inherit',k:'Inheritance'},
{line:'AI does not meet us in tokens. It meets us in completed sentences.',example:'Action inherits the finished claim, not the internal token stream.',viz:'tokens',k:'AI output'},
{line:'Every completed sentence lands somewhere. That landing is its address.',example:'Address means structural landing — not topic, paraphrase, or vibe.',viz:'pin',k:'Address'},
{line:'Two similar sentences can have different addresses: “The door closed” and “The door is closed.”',example:'One leaves an event. The other leaves a state.',viz:'door',k:'Surface similarity'},
{line:'The A-packet slows the sentence down long enough for structure to become visible.',example:'A1 to A6 creates the held-open moment.',viz:'apacket',k:'The instrument'},
{line:'A1 to A6 is not the theory. It is the instrument that lets us see the theory.',example:'It separates the track from the hypnotic force of the raw sentence.',viz:'instrument',k:'Inspection'},
{line:'A receipt is what remains when a sentence has shown its commitments.',example:'Not a summary. An audit trail of the landing.',viz:'receipt',k:'Receipts'},
{line:'A successful translation should preserve the address, even when every word changes.',example:'The surface changes. The settlement should remain.',viz:'translation',k:'Translation test'},
{line:'In the Galway packet, English and Irish sentence pairs resolve to the same structural landings.',example:'Not proof of universality — a local pressure test worth protecting and extending.',viz:'galway',k:'Bilingual pressure test'},
{line:'The future I am imagining is simple: every important sentence carries a small audit label.',example:'Before a sentence governs action, it shows where it landed.',viz:'audit',k:'Future product'}
];
let i=0;const deck=document.getElementById('deck'),progress=document.getElementById('progress');
function visual(type){if(type==='rails')return '<div class="rails"><i class="tie" style="left:10%"></i><i class="tie" style="left:25%"></i><i class="tie" style="left:40%"></i><i class="tie" style="left:55%"></i><i class="tie" style="left:70%"></i><div class="train"></div></div><div class="smalllabel">Meaning is the train. Structure is the track.</div>';if(type==='gap')return '<div class="rails"><i class="tie" style="left:10%"></i><i class="tie" style="left:28%"></i><i class="tie" style="left:58%"></i><i class="tie" style="left:76%"></i><div class="gap"></div></div><div class="smalllabel">The missing piece is felt before it is named.</div>';if(type==='dog1')return '<div class="dog">Did you put<br>the dog <span class="blank"></span> ?</div>';if(type==='dog2')return '<div class="dog">Did you put<br>the dog out?</div><div class="overshoot">milk</div>';if(type==='machine')return '<div class="machine"><i class="wire one"></i><i class="wire two"></i></div>';if(type==='inherit')return '<div class="inherit"><span class="node">sentence</span><span class="arrow">→</span><span class="node">system</span><span class="arrow">→</span><span class="node">action</span></div>';if(type==='tokens')return '<div class="tokens">'+Array.from({length:36},()=>'<span class="token"></span>').join('')+'</div><div class="sentencebar">completed sentence</div>';if(type==='pin')return '<div class="pin"></div><div class="smalllabel">The landing is the address.</div>';if(type==='door')return '<div class="doorgrid"><div class="doorrow"><span>The door closed</span><span class="tag">event</span></div><div class="doorrow"><span>The door is closed</span><span class="tag">state</span></div></div>';if(type==='apacket'||type==='instrument')return '<div class="apacket"><div class="cell">A1</div><div class="cell">A2</div><div class="cell">A3</div><div class="cell">A4</div><div class="cell">A5</div><div class="cell">A6</div></div><div class="smalllabel">The held-open gap.</div>';if(type==='receipt')return '<div class="receipt"><strong>Sentence receipt</strong><div></div><div></div><div></div><div></div><div></div></div>';if(type==='translation'||type==='galway')return '<div class="translation"><div class="lang">English sentence</div><div class="same">same structural landing</div><div class="lang">Irish sentence</div></div>';return '<div class="labelcard">sentence <span class="audit">AUDIT</span><br>label</div>'}
function render(){deck.innerHTML=slides.map((s,n)=>`<section class="slide ${n===i?'active':''}"><div class="copy"><div class="top"><span>Settlement Gate</span><span class="count">${String(n+1).padStart(2,'0')} / 15</span></div><div class="kicker">${s.k}</div><h1 class="line">${s.line}</h1><p class="example">${s.example}</p><div class="ask">The spoken script carries the argument. This card keeps the listener on the track.</div></div><div class="visual">${visual(s.viz)}</div></section>`).join('');progress.style.width=((i+1)/slides.length*100)+'%'}
function next(){i=Math.min(slides.length-1,i+1);render()}function prev(){i=Math.max(0,i-1);render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();});render();
</script>
</body>
</html>
