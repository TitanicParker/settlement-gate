<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Settlement Gate — Audience Deck</title>
<style>
:root{--bg:#111b20;--ink:#fff8ec;--paper:#f7efe2;--text:#10191e;--muted:#66737a;--line:#d5cbbc;--blue:#255d72;--rust:#a45d3a;--gold:#d3a64f}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 12% 20%,rgba(211,166,79,.16),transparent 28%),radial-gradient(circle at 88% 70%,rgba(37,93,114,.26),transparent 34%),var(--bg);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}body{overflow:hidden}.progress{position:fixed;left:0;top:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--rust));z-index:6;width:0}.hint{position:fixed;right:22px;top:18px;color:rgba(255,248,236,.7);font-size:.92rem}.deck{height:100svh;display:grid;place-items:center;padding:28px 28px 86px}.slide{display:none;width:min(1180px,95vw);height:min(720px,82svh);background:var(--paper);color:var(--text);border-radius:34px;box-shadow:0 38px 110px rgba(0,0,0,.36);padding:42px 48px;position:relative;overflow:hidden}.slide.active{display:grid;grid-template-columns:1.05fr .95fr;gap:36px}.slide:before{content:"";position:absolute;inset:auto 0 0 0;height:10px;background:linear-gradient(90deg,var(--blue),var(--gold),var(--rust))}.top{display:flex;justify-content:space-between;align-items:center;color:var(--blue);font-size:.78rem;letter-spacing:.09em;text-transform:uppercase;font-weight:950}.count{color:var(--muted)}.minute{margin-top:38px;display:inline-flex;border:1px solid rgba(37,93,114,.25);border-radius:999px;padding:8px 11px;color:var(--blue);font-weight:950;font-size:.84rem;text-transform:uppercase}.line{font-size:clamp(2rem,4.45vw,4.85rem);line-height:.94;letter-spacing:-.072em;font-weight:950;margin:18px 0 0}.cue{margin-top:26px;font-size:clamp(1.08rem,1.85vw,1.48rem);line-height:1.25;color:#344147;font-weight:760;max-width:660px}.listen{margin-top:34px;border-left:6px solid var(--rust);padding:14px 0 14px 18px;color:#3a454a;font-size:1.02rem;line-height:1.36}.visual{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.56),rgba(255,255,255,.22));display:grid;place-items:center;overflow:hidden;min-height:480px;position:relative}.visualText{font-size:clamp(2rem,5vw,4.6rem);font-weight:950;letter-spacing:-.06em;color:var(--blue);text-align:center;padding:32px}.small{font-size:clamp(1.05rem,2vw,1.5rem);line-height:1.15;color:var(--rust);margin-top:16px;display:block;letter-spacing:-.025em}.rails{width:78%;height:48%;position:relative}.rails:before,.rails:after{content:"";position:absolute;left:0;right:0;height:8px;background:var(--blue);border-radius:999px}.rails:before{top:34%}.rails:after{bottom:34%}.train{position:absolute;left:8%;top:50%;width:86px;height:44px;border-radius:14px 20px 20px 14px;background:var(--rust);transform:translateY(-50%);box-shadow:140px 0 0 var(--gold),280px 0 0 var(--blue)}.gap{width:70%;height:10px;background:linear-gradient(90deg,var(--blue) 0 38%,transparent 38% 60%,var(--blue) 60% 100%);border-radius:999px}.door{display:grid;gap:28px;width:84%;font-size:clamp(1.35rem,2.9vw,2.8rem);font-weight:950;color:var(--blue)}.door div{display:flex;justify-content:space-between;border-bottom:4px solid var(--line);padding-bottom:12px}.tag{color:var(--rust)}.packet{display:grid;grid-template-columns:repeat(3,82px);gap:14px}.cell{height:82px;border-radius:22px;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:950;font-size:1.4rem}.flow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;width:85%;font-weight:950}.pipe{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px 15px;color:var(--blue)}.receipt{width:72%;background:#fff;border:1px solid var(--line);border-radius:22px;padding:28px}.receipt div{height:12px;background:var(--line);border-radius:99px;margin:14px 0}.receipt div:nth-child(1){background:var(--blue);width:80%}.receipt div:nth-child(3){background:var(--rust);width:62%}.nav{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:10px;z-index:5;padding:12px max(12px,env(safe-area-inset-left)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-right));background:linear-gradient(180deg,rgba(17,27,32,0),rgba(17,27,32,.95) 34%)}.nav button,.nav a{border:1px solid rgba(255,248,236,.22);background:rgba(255,248,236,.14);backdrop-filter:blur(10px);color:var(--ink);border-radius:999px;padding:11px 15px;text-decoration:none;font-weight:900;cursor:pointer;min-width:76px;text-align:center}.mobiletap{display:none}@media(max-width:850px){body{overflow:hidden}.hint{display:none}.deck{height:100svh;padding:10px 10px 82px;align-items:stretch}.slide{width:100%;height:calc(100svh - 96px);border-radius:22px;padding:16px 16px 18px;box-shadow:0 16px 52px rgba(0,0,0,.32);overflow:auto;-webkit-overflow-scrolling:touch}.slide.active{display:grid;grid-template-columns:1fr;grid-template-rows:auto auto;gap:12px}.slide:before{height:7px}.top{font-size:.68rem;letter-spacing:.07em;gap:10px}.minute{margin-top:12px;font-size:.68rem;padding:6px 9px}.line{font-size:clamp(1.75rem,9.2vw,3.15rem);line-height:.94;letter-spacing:-.065em;margin:10px 0 0}.cue{font-size:clamp(.98rem,4.4vw,1.18rem);line-height:1.25;margin-top:14px;font-weight:760}.listen{margin-top:14px;font-size:.92rem;line-height:1.28;padding:10px 0 10px 12px;border-left-width:5px}.visual{min-height:155px;border-radius:20px;order:-1}.visualText{font-size:clamp(1.45rem,8vw,2.55rem);line-height:.95;padding:16px;letter-spacing:-.055em}.small{font-size:clamp(.9rem,4.2vw,1.15rem);margin-top:8px}.rails{width:82%;height:100px}.train{width:54px;height:30px;box-shadow:82px 0 0 var(--gold),164px 0 0 var(--blue)}.door{gap:12px;width:92%;font-size:clamp(1rem,5vw,1.45rem)}.door div{gap:8px;align-items:center;border-bottom-width:3px}.packet{grid-template-columns:repeat(6,1fr);gap:6px;width:94%}.cell{height:44px;border-radius:13px;font-size:1rem}.flow{width:94%;gap:6px;font-size:.84rem}.pipe{padding:8px 9px;border-radius:13px}.receipt{width:88%;padding:16px;border-radius:18px}.receipt div{height:9px;margin:10px 0}.nav{gap:8px;padding-top:22px}.nav button,.nav a{padding:10px 12px;min-width:68px;font-size:.92rem}.mobiletap{display:block;position:fixed;top:0;bottom:74px;width:28%;z-index:4;background:transparent;border:0}.mobiletap.prevzone{left:0}.mobiletap.nextzone{right:0}}@media(max-width:380px){.line{font-size:clamp(1.55rem,8.6vw,2.55rem)}.cue{font-size:.95rem}.listen{font-size:.86rem}.visual{min-height:132px}.nav button,.nav a{min-width:auto;padding:9px 10px;font-size:.86rem}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="hint">Use ← → keys</div>
<button class="mobiletap prevzone" onclick="prev()" aria-label="Previous slide"></button>
<button class="mobiletap nextzone" onclick="next()" aria-label="Next slide"></button>
<main class="deck" id="deck"></main>
<nav class="nav"><a href="index.html">Landing</a><button onclick="prev()">Back</button><button onclick="next()">Next</button></nav>
<script>
const slides=[
{m:'Minutes 2–3',line:'A sentence is not complete because it stops. It stops because it has become complete.',cue:'The train-and-track metaphor reverses the ordinary assumption: stopping is not completion; completion is the landing that makes stopping possible.',listen:'Meaning arrives. The train reaches the station. The rails disappear.',viz:'rails'},
{m:'Minute 4',line:'You know a sentence is broken before you know why it is broken.',cue:'The listener feels the break before naming grammar, syntax, or transitivity.',listen:'The little jolt, recoil, and waiting.',viz:'gap'},
{m:'Minute 5',line:'“Did you put the dog?” exposes the structure by failing to close.',cue:'The sentence opens a demand and does not satisfy it. The listener waits for the missing landing.',listen:'“Put the dog where?” Before-closure failure.',viz:'dog1'},
{m:'Minute 6',line:'“Did you put the dog out, milk?” exposes the structure by going past closure.',cue:'The sentence has already landed; “milk” arrives after closure and damages the completed act.',listen:'Completion has edges — too little fails, too much violates.',viz:'dog2'},
{m:'Minutes 7–8',line:'Meaning is so successful that it hides the machinery that produced it.',cue:'Working sentences hide their structure because meaning arrives too quickly and too successfully.',listen:'Comprehension is not inspection.',viz:'machine'},
{m:'Minute 11',line:'The sentence is the smallest unit of language that can be inherited.',cue:'Legal clauses, policy rules, medical instructions, translations, and AI-agent commands travel as completed sentences.',listen:'Once a sentence lands, another person or system may act from it.',viz:'inherit'},
{m:'Minute 12',line:'AI does not meet us in tokens. It meets us in completed sentences.',cue:'We do not sign, obey, approve, or govern from isolated tokens.',listen:'The completed sentence is the first auditable unit of AI output.',viz:'tokens'},
{m:'Minute 13',line:'Every completed sentence lands somewhere. That landing is its address.',cue:'Address does not mean topic, grammar, or paraphrase. It means the structural landing created when the sentence completes.',listen:'A sentence does something, sends attention somewhere, and leaves something behind.',viz:'pin'},
{m:'Minutes 14–15',line:'Two similar sentences can have different addresses: “The door closed” and “The door is closed.”',cue:'Same door, similar surface, different landing: one event occurred; one state holds.',listen:'Surface meaning is not enough.',viz:'door'},
{m:'Minutes 16–17',line:'The A-packet slows the sentence down long enough for structure to become visible.',cue:'A1 to A6 interrupts the collapse into meaning and creates the held-open moment before the sentence can govern action.',listen:'Sentence → A-packet → Resolver → Address → Receipt.',viz:'apacket'},
{m:'Minute 18',line:'A1 to A6 is not the theory. It is the instrument that lets us see the theory.',cue:'The six questions expose survivor, governed object, work, scope, remaining shape, and defeated rival.',listen:'A6 acts as the immune system of the method.',viz:'instrument'},
{m:'Minutes 19–20',line:'A receipt is what remains when a sentence has shown its commitments.',cue:'The receipt records what the sentence settled, where it holds, and what rival reading was blocked.',listen:'Proceed, revise, escalate, block, or request evidence.',viz:'receipt'},
{m:'Minute 24',line:'A successful translation should preserve the address, even when every word changes.',cue:'If address is structural, faithful translation should preserve the landing even when wording changes.',listen:'If the address changes, either the translation shifted or the resolution failed.',viz:'translation'},
{m:'Minute 25',line:'In the Galway packet, English and Irish sentence pairs resolve to the same structural landings.',cue:'The local bilingual pressure test gives the idea something concrete and testable.',listen:'Not proof of universality — a result worth protecting.',viz:'galway'},
{m:'Minutes 27–30',line:'The future I am imagining is simple: every important sentence carries a small audit label.',cue:'The close returns to the ask: protect first, validate second, product third.',listen:'A sentence says, does, and lands. The A-packet exposes the track.',viz:'audit'}
];
let i=0;const deck=document.getElementById('deck'),progress=document.getElementById('progress');
function visual(type){if(type==='rails')return '<div class="rails"><div class="train"></div></div>';if(type==='gap')return '<div class="gap"></div>';if(type==='dog1')return '<div class="visualText">Did you put<br>the dog ___ ?</div>';if(type==='dog2')return '<div class="visualText">Did you put<br>the dog out?<span class="small">milk</span></div>';if(type==='door')return '<div class="door"><div><span>The door closed</span><span class="tag">event</span></div><div><span>The door is closed</span><span class="tag">state</span></div></div>';if(type==='apacket')return '<div class="flow"><span class="pipe">Sentence</span>→<span class="pipe">A-packet</span>→<span class="pipe">Resolver</span>→<span class="pipe">Address</span>→<span class="pipe">Receipt</span></div>';if(type==='instrument')return '<div class="packet"><div class="cell">A1</div><div class="cell">A2</div><div class="cell">A3</div><div class="cell">A4</div><div class="cell">A5</div><div class="cell">A6</div></div>';if(type==='receipt')return '<div class="receipt"><strong>Sentence receipt</strong><div></div><div></div><div></div><div></div></div>';if(type==='translation'||type==='galway')return '<div class="visualText">English<br><span class="small">same structural landing</span><br>Irish</div>';if(type==='audit')return '<div class="visualText">sentence<br><span class="small">AUDIT LABEL</span></div>';if(type==='tokens')return '<div class="visualText">tokens<br><span class="small">become completed sentences</span></div>';if(type==='inherit')return '<div class="visualText">sentence → inherited → action</div>';if(type==='pin')return '<div class="visualText">landing<br><span class="small">= address</span></div>';return '<div class="visualText">meaning hides machinery</div>'}
function render(){deck.innerHTML=slides.map((s,n)=>`<section class="slide ${n===i?'active':''}"><div><div class="top"><span>Settlement Gate</span><span class="count">${String(n+1).padStart(2,'0')} / 15</span></div><div class="minute">${s.m}</div><h1 class="line">${s.line}</h1><p class="cue">${s.cue}</p><div class="listen"><strong>Delivery cue:</strong> ${s.listen}</div></div><div class="visual">${visual(s.viz)}</div></section>`).join('');progress.style.width=((i+1)/slides.length*100)+'%'}
function next(){i=Math.min(slides.length-1,i+1);render()}function prev(){i=Math.max(0,i-1);render()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();});render();
</script>
</body>
</html>
